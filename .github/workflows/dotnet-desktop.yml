name: Build PaDDY Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: 8.0.x
  SOLUTION_PATH: PaDDY.sln
  PROJECT_PATH: PaDDY.csproj
  ARTIFACT_ROOT: bin/artifacts

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore $env:SOLUTION_PATH

    - name: Build
      run: dotnet build $env:PROJECT_PATH --configuration Release --no-restore

    - name: Read project version
      id: version
      run: |
        [xml]$project = Get-Content $env:PROJECT_PATH
        $version = $project.Project.PropertyGroup.Version

        if ([string]::IsNullOrWhiteSpace($version)) {
          throw "PaDDY.csproj does not contain a Version value."
        }

        "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Publish release files
      id: publish
      env:
        VERSION: ${{ steps.version.outputs.value }}
      run: |
        $publishDir = Join-Path $env:ARTIFACT_ROOT "PaDDY-$env:VERSION"

        if (Test-Path $publishDir) {
          Remove-Item $publishDir -Recurse -Force
        }

        dotnet publish $env:PROJECT_PATH --configuration Release --no-build --output $publishDir /p:DebugType=None

        Get-ChildItem -Path $publishDir -Include *.pdb, *.xml -Recurse |
          Remove-Item -Force -ErrorAction SilentlyContinue

        $appSettingsPath = Join-Path $publishDir "appsettings.json"
        if (Test-Path $appSettingsPath) {
          Remove-Item $appSettingsPath -Force
        }

        "publish_dir=$publishDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Create release zip
      id: archive
      env:
        VERSION: ${{ steps.version.outputs.value }}
        PUBLISH_DIR: ${{ steps.publish.outputs.publish_dir }}
      run: |
        $zipPath = Join-Path $env:ARTIFACT_ROOT "PaDDY-$env:VERSION.zip"

        if (Test-Path $zipPath) {
          Remove-Item $zipPath -Force
        }

        Compress-Archive -Path (Join-Path $env:PUBLISH_DIR "*") -DestinationPath $zipPath -Force
        "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Upload published folder
      uses: actions/upload-artifact@v4
      with:
        name: PaDDY-${{ steps.version.outputs.value }}
        path: ${{ steps.publish.outputs.publish_dir }}
        if-no-files-found: error

    - name: Upload release zip
      uses: actions/upload-artifact@v4
      with:
        name: PaDDY-${{ steps.version.outputs.value }}-zip
        path: ${{ steps.archive.outputs.zip_path }}
        if-no-files-found: error
